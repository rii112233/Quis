<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertanyaan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    max-width:400px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#siap{
    background:#28a745;
    color:white;
}

#belum{
    background:#dc3545;
    color:white;
}
</style>
</head>

<body>

<div class="box">
    <h2>Halo!</h2>
    <p>Siap atau belum?</p>

    <button id="siap" onclick="gombal()">Siap</button>
    <button id="belum" onclick="alert('Baik, aku tunggu sampai kamu siap.')">Belum</button>
</div>

<script>
function gombal(){
    alert("Kalau semua orang punya alasan untuk tersenyum, alasanku sederhana: kamu.");
}
</script>

</body>
  </html>
